name: wildguard_ai
description: WildGuard AI — Wayanad Human-Elephant Conflict Prevention System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video playback
  video_player: ^2.8.3
  chewie: ^1.7.4

  # Maps (free, no API key needed for basic tiles)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Camera / live feed
  camera: ^0.10.5+9

  # State management
  provider: ^6.1.2
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # Charts
  fl_chart: ^0.68.0

  # UI extras
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1

  # Notifications & alerts
  flutter_local_notifications: ^17.1.2
  vibration: ^1.9.0

  # Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.3+1
  web_socket_channel: ^2.4.5

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Utils
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  badges: ^3.1.2
  gap: ^3.0.1
  auto_size_text: ^3.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/videos/
    - assets/images/
  fonts:
    - family: Syne
      fonts:
        - asset: assets/fonts/Syne-Regular.ttf
        - asset: assets/fonts/Syne-Bold.ttf
          weight: 700
        - asset: assets/fonts/Syne-ExtraBold.ttf
          weight: 800
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
